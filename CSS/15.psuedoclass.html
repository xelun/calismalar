<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {

            font-size: 10px;
        }
        .input {

            margin: 0.5rem;
            padding: 0.5rem;
            text-align: center;
            border-radius: 1rem;
            outline: none;
        }
        .input3 {

            background: blue;
            border: 0.3rem solid black;
            
        }
        .input1:focus {

            background: aqua;
            border: 0.5rem solid black;
            
        }
        .input2:focus {

            background: pink;
            border: 0.5rem solid black;
            
        }
    </style>
</head>
<body>
    <input class="input input1" type="text" placeholder="1">
    <input class="input input2" type="text" placeholder="2">
    <input class="input input3" type="text" placeholder="3">
</body>
</html>
