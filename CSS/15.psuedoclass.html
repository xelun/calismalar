<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo</title>

    <style>

        a:link {
            color: blue;
        }

        a:visited {
            color: purple;
        }

        a:hover {
            color: red;
        }

        a:active {
            color: green;
        }

        button:hover {
            background: black;
            color: white;
        }

        button:active {
            background: red;
        }

        input:focus {
            border: 2px solid red;
            outline: none;
        }

        .box {
            width: 150px;
            height: 80px;
            background: gray;
            margin-top: 20px;
        }

        .box:hover {
            background: orange;
        }

        .box:active {
            background: black;
        }

    </style>

</head>
<body>

    <a href="https://google.com">Link</a>

    <br><br>

    <button>Tikla</button>

    <br><br>

    <input type="text" placeholder="tikla">

    <br><br>

    <div class="box"></div>

</body>
</html>
