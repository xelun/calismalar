<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selectors</title>

    <style>
        h1 { color: red; }
        .info { color: purple; }
        #logo { color: green; }
        .info span { color: orange; }
    </style>

</head>
<body>

    <h1>Başlık</h1>

    <p class="info">Bu info class</p>

    <p id="logo">Bu id logo</p>

    <p class="info">
        Bu yazı <span>span ile değişti</span>
    </p>

</body>
</html>
