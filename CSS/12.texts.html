<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Test</title>

    <style>
        body {
            background: #222;
            color: white;
            font-family: Arial;
        }

        .no-shadow {
            font-size: 40px;
            margin: 20px;
        }

        .with-shadow {
            font-size: 40px;
            padding: 20px;
            text-shadow: 2px 2px 5px black;
        }

        .strong-shadow {
            font-size: 40px;
            margin: 20px;
            text-shadow: 5px 5px 15px red;
        }
    </style>

</head>
<body>

    <div class="no-shadow">Kerem (Shadow yok)</div>

    <div class="with-shadow">Kerem (Normal shadow)</div>

    <div class="strong-shadow">Kerem (Abartı shadow)</div>

</body>
</html>
