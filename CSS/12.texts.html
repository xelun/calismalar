<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS TEXT PRACTICE</title>

    <style>
        .kutu {
            width: 600px;
            border: 3px solid black;
            padding: 20px;
            margin: 50px auto;
        }

        .baslik {
            text-align: center;
            text-transform: uppercase;
            font-size: 30px;
            text-decoration: underline;
        }

        .yazi1 {
            color: blue;
            letter-spacing: 2px;
        }

        .yazi2 {
            color: red;
            line-height: 30px;
        }

        .yazi3 {
            text-decoration: line-through;
        }

        .yazi4 {
            text-decoration: overline;
        }

        .yazi5 {
            text-align: right;
        }

        .yazi6 {
            text-decoration: none;
        }
    </style>

</head>
<body>

    <div class="kutu">

        <h1 class="baslik">KEREM CSS TEXT</h1>

        <p class="yazi1">
            Bu yazı mavi ve harfler arası boşluk var
        </p>

        <p class="yazi2">
            Bu yazı kırmızı ve satırlar arası boşluk var
        </p>

        <p class="yazi3">
            Bu yazının üstü çizili
        </p>

        <p class="yazi4">
            Bu yazının üstünde çizgi var
        </p>

        <p class="yazi5">
            Bu yazı sağa hizalı
        </p>

        <p class="yazi6">
            Bu yazıda hiçbir decoration yok
        </p>

    </div>

</body>
</html>
