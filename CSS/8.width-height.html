<html lang="en">
<head>

<title>width-height</title>

<style>
.box {
  width: 100%;
  height: 50px;
}

.k1 { background: brown; }
.k2 { background: yellow; }
.k3 { background: black; }
.k4 { background: pink; }
</style>

</head>
<body>

<div class="box k1"></div>
<hr>
<div class="box k2"></div>
<hr>
<div class="box k3"></div>
<hr>
<div class="box k4"></div>

</body>
</html>
