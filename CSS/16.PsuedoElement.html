<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Element Demo</title>

    <style>
        .para1 {
            font-size: 1.5em;
            line-height: 1.5em;
        }

        /* İlk harf */
        .para1::first-letter {
            color: red;
            font-size: 50px;
        }

        /* İlk satır */
        .para1::first-line {
            color: blue;
        }

        /* Başa ekleme */
        .para1::before {
            content: ">>> ";
        }

        /* Sona ekleme */
        .para1::after {
            content: " END ⭐";
        }
    </style>
</head>
<body>

    <p class="para1">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit vel nam at unde nostrum quae illum numquam blanditiis sit cumque veritatis repudiandae minus deserunt minima officiis modi architecto molestiae deleniti.
    </p>

</body>
</html>
